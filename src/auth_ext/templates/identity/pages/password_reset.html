{% extends "layouts/page.html" %}

{% block content %}
<section class="surface-panel">
  <p class="eyebrow">Identity</p>
  <h1>Reset password</h1>
  {% if form_message is defined and form_message %}
  <p role="status">{{ form_message }}</p>
  {% endif %}
  {% if form_error is defined and form_error %}
  <p role="alert">{{ form_error }}</p>
  {% endif %}
  <form action="{{ request.url_for('identity:password-reset-request') }}" method="post">
    <input name="{{ csrf_field_name }}" type="hidden" value="{{ csrf_token }}">
    <label>
      Email
      <input autocomplete="email" name="email" required type="email" value="{{ email or '' }}">
    </label>
    <button type="submit">Request reset link</button>
  </form>
  <details>
    <summary>Have a reset token?</summary>
    <form action="{{ request.url_for('identity:password-reset-confirm') }}" method="post">
      <input name="{{ csrf_field_name }}" type="hidden" value="{{ csrf_token }}">
      <label>
        Reset token
        <input autocomplete="one-time-code" name="token" required type="text">
      </label>
      <label>
        New password
        <input autocomplete="new-password" name="password" required type="password">
      </label>
      <button type="submit">Set password</button>
    </form>
  </details>
</section>
{% endblock %}
