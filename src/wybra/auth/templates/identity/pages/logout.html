{% extends "layouts/page.html" %}

{% block content %}
<section class="surface-panel">
  <p class="eyebrow">Account</p>
  <h1>Sign out</h1>
  <p class="muted-copy">End the current browser session.</p>
  <form action="{{ request.url_for('auth:logout') }}" method="post">
    {{ render_csrf_field() }}
    <button type="submit">Sign out</button>
  </form>
</section>
{% endblock %}
