<fieldset class="wybra-form-field wybra-form-options{% if field.errors %} wybra-form-field--error{% endif %}{% if field.required %} wybra-form-field--required{% endif %}{% if field.disabled %} wybra-form-field--disabled{% endif %}">
  <legend class="wybra-form-label">{{ field.label }}</legend>
  {% for option in field.options() %}
    <label class="wybra-form-option" for="{{ field.name }}_{{ loop.index }}">
      <input
        id="{{ field.name }}_{{ loop.index }}"
        name="{{ field.name }}"
        type="radio"
        value="{{ option.value }}"
        {% if option.selected %}checked{% endif %}
        {% if field.required %}required{% endif %}
        {% if field.disabled %}disabled{% endif %}
        {% for name, value in attr.items() %}{% if value is sameas true %} {{ name }}{% elif value is not sameas false %} {{ name }}="{{ value }}"{% endif %}{% endfor %}
      >
      <span>{{ option.label }}</span>
    </label>
  {% endfor %}
  {% include "forms/widgets/_help.html" %}
  {% include "forms/widgets/_field_errors.html" %}
</fieldset>
