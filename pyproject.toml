[project]
name = "wevra"
version = "0.1.0"
description = "Reusable async FastAPI web, database, tooling, and auth framework components"
readme = "README.md"
authors = [
    { name = "David Nugent" }
]
requires-python = ">=3.13"
dependencies = [
    "aiosqlite>=0.22.1",
    "alembic>=1.18.4",
    "asyncpg>=0.31.0",
    "click>=8.4.1",
    "dateparser>=1.4.0",
    "dbscripts",
    "envex>=5.0.0",
    "fastapi>=0.136.3",
    "fastapi-users[sqlalchemy]>=15.0.5",
    "jinja2>=3.1.6",
    "pydantic>=2.12.5",
    "pyjwt>=2.10.1",
    "sqlalchemy[asyncio]>=2.0.50",
    "starlette>=0.50.0",
    "uvicorn>=0.48.0",
]

[project.scripts]
wevra-identitymgr = "wevra.auth.cli.identitymgr:main"
wevra-migrate = "wevra.tools.migrate:main"
wevra-routes = "wevra.tools.routes:main"
wevra-runserver = "wevra.tools.runserver:main"
wevra-validate = "wevra.tools.validate:main"

[build-system]
requires = ["uv_build>=0.11.18,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = ["wevra"]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pre-commit>=4.6.0",
    "pytest>=9.0.3",
    "ruff>=0.15.16",
    "ty>=0.0.42",
]

[tool.ruff]
line-length = 88
src = ["src", "tests"]
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.uv.sources]
dbscripts = { git = "https://github.com/deeprave/dbscripts" }
