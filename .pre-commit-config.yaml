# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        args: ["--branch", "main"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty-wevra
        name: ty type checker wevra
        entry: uv run ty check src/
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest-wevra
        name: pytest wevra
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        types: [python]

      - id: verify-signature
        name: Verify Commit Signature
        entry: >-
          bash -c 'status="$(git log -1 --format=%G?)";
          if [ "$status" = "G" ] || [ "$status" = "U" ]; then
            exit 0;
          fi;
          echo "Last commit signature is missing or invalid (status: $status)." >&2;
          exit 1;'
        language: system
        always_run: true
        pass_filenames: false
        stages: [post-commit]

  - repo: https://github.com/deeprave/osvcheck
    rev: v1.3.0
    hooks:
      - id: osvcheck

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/PyCQA/bandit
    rev: "1.9.4"
    hooks:
      - id: bandit
        args: ["-ll", "-r", "src/"]
        exclude: ^tests/

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        args: ["src", "vulture_whitelist.py"]
