name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    # Skip draft and Dependabot PRs; Dependabot updates are handled separately.
    if: github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request. Focus on:
            - Logic errors and bugs
            - Security issues
            - Missing error handling
            - Performance concerns
            - Test coverage, edge cases, parameterisation opportunities
            Skip:
             - trivial pull requests too few lines or too simple.
             - trivial style/formatting comments unless they indicate a real problem.
            Post inline comments on specific lines where relevant.
            Use cut-and-paste friendly formatting, quoting code with line numbers and code fences.
            Provide clear, actionable feedback with best practicecode suggestions where appropriate.
