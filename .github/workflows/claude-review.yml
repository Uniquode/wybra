name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          use_sticky_comment: 'true'
          track_progress: true   # optional: live checkbox progress comment
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Focus on:
            - Logic errors and bugs
            - Security issues
            - Missing error handling
            - Performance concerns
            - Test coverage, edge cases, parameterisation opportunities
            Skip:
            - trivial pull requests too few lines or too simple.
            - trivial style/formatting comments unless they indicate a real problem.

            Post inline comments on specific lines where relevant, using
            mcp__github_inline_comment__create_inline_comment (with confirmed: true).
            Use cut-and-paste friendly formatting, quoting code with line numbers and code fences.
            Provide clear, actionable feedback with best-practice code suggestions where appropriate.
            Only post GitHub comments — don't just return the review as plain assistant text.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
