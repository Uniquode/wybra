name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync

      - name: Check formatting
        run: uv run ruff format --check src tests

      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run ty check src/

      - name: Test
        run: uv run pytest -q

      - name: Smoke runserver
        run: uv run python scripts/smoke_runserver.py

      - name: Build package
        run: uv build

  tests-required-check:
    name: Tests
    runs-on: ubuntu-latest
    needs: tests
    if: ${{ always() }}

    steps:
      - name: Require matrix tests to pass
        run: |
          if [ "${{ needs.tests.result }}" != "success" ]; then
            echo "Matrix tests result: ${{ needs.tests.result }}"
            exit 1
          fi
